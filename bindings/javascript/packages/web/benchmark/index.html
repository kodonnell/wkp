<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WKP Web Benchmark</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            margin: 24px;
            line-height: 1.4;
            background: #fff;
            color: #111;
        }

        h1 {
            margin-top: 0;
            font-size: 1.2rem;
        }

        #log {
            background: #f4f4f4;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            min-height: 320px;
        }
    </style>
</head>

<body>
    <h1>WKP Web Benchmark</h1>
    <p>
        Query params: <code>?points=10000&precision=5&iterations=200</code>
    </p>
    <pre id="log"></pre>
    <script>
        const log = document.getElementById('log');
        if (window.location.protocol === 'file:') {
            log.textContent = [
                'This page cannot run from file:// due to browser CORS/module restrictions.',
                '',
                'Run from a local HTTP server instead:',
                '  cd bindings/javascript/packages/web',
                '  python -m http.server 8080',
                '',
                'Then open:',
                '  http://localhost:8080/benchmark/index.html?points=10000&precision=5&iterations=200'
            ].join('\n');
        } else {
            const script = document.createElement('script');
            script.type = 'module';
            script.src = './benchmark.js';
            document.body.appendChild(script);
        }
    </script>
</body>

</html>
