name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - js-published
  workflow_dispatch:
    inputs:
      web_version:
        description: "Optional @wkpjs/web version to deploy (defaults to latest)"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Pages artifact from docs + web runtime
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .pages-dist .pages-tmp
          mkdir -p .pages-dist .pages-tmp

          cp -R docs/. .pages-dist/

          WEB_VERSION=""
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            WEB_VERSION='${{ github.event.client_payload.web_version }}'
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            WEB_VERSION='${{ github.event.inputs.web_version }}'
          fi

          if [[ -n "$WEB_VERSION" ]]; then
            PACKAGE_SPEC="@wkpjs/web@$WEB_VERSION"
          else
            PACKAGE_SPEC="@wkpjs/web@latest"
          fi

          if [[ -n "$WEB_VERSION" ]]; then
            for attempt in {1..20}; do
              if npm view "@wkpjs/web@$WEB_VERSION" version >/dev/null 2>&1; then
                break
              fi
              if [[ "$attempt" -eq 20 ]]; then
                echo "Timed out waiting for @wkpjs/web@$WEB_VERSION on npm"
                exit 1
              fi
              echo "@wkpjs/web@$WEB_VERSION not visible yet (attempt $attempt/20); waiting 15s"
              sleep 15
            done
          fi

          npm pack "$PACKAGE_SPEC" --pack-destination .pages-tmp
          TARBALL="$(ls .pages-tmp/wkpjs-web-*.tgz | head -n 1)"
          mkdir -p .pages-tmp/pkg
          tar -xzf "$TARBALL" -C .pages-tmp/pkg

          WEB_PUBLISHED_VERSION="$(node -p "require('./.pages-tmp/pkg/package/package.json').version")"
          echo "Using @wkpjs/web version: $WEB_PUBLISHED_VERSION"

          mkdir -p .pages-dist/web
          mkdir -p ".pages-dist/web/$WEB_PUBLISHED_VERSION"

          # Versioned path is the primary docs load target to avoid stale cache collisions.
          cp -R .pages-tmp/pkg/package/src ".pages-dist/web/$WEB_PUBLISHED_VERSION/src"
          cp -R .pages-tmp/pkg/package/dist ".pages-dist/web/$WEB_PUBLISHED_VERSION/dist"

          # Legacy unversioned path kept as fallback for older clients.
          cp -R .pages-tmp/pkg/package/src .pages-dist/web/src
          cp -R .pages-tmp/pkg/package/dist .pages-dist/web/dist
          cp .pages-tmp/pkg/package/package.json .pages-dist/web/package.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
