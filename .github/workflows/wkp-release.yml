name: Create WKP product release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to release (for example wkp-v0.4.0)"
        required: true
        type: string
  push:
    tags:
      - "wkp-v*.*.*"

jobs:
  validate-tag:
    name: Validate release tag format
    runs-on: ubuntu-latest
    steps:
      - name: Check tag format
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^wkp-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid WKP tag '$TAG'. Expected format: wkp-vX.Y.Z"
            exit 1
          fi

  release:
    name: Create GitHub release
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          generate_release_notes: true
