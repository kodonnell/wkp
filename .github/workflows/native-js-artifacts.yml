name: Build native and JavaScript artifacts (CI)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cpp-build:
    name: C++ build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build/core -DCMAKE_BUILD_TYPE=Release -DWKP_BUILD_TESTS=ON -DWKP_BUILD_BENCHMARKS=ON -DWKP_BUILD_PYTHON_BINDINGS=OFF

      - name: Build C++ targets
        run: cmake --build build/core --config Release

      - name: Run C++ tests
        run: ctest --test-dir build/core -C Release --output-on-failure

      - name: Upload C++ artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-artifacts-${{ matrix.os }}
          path: |
            build/core/Release/wkp_core*.dll
            build/core/Release/wkp_core*.lib
            build/core/Release/wkp_cpp_benchmark*
            build/core/libwkp_core*.so
            build/core/libwkp_core*.a
            build/core/libwkp_core*.dylib
            build/core/wkp_cpp_benchmark*
            build/core/**/*.so
            build/core/**/*.dylib
            build/core/**/*.dll
            build/core/**/*.a
            build/core/**/*.lib

  js-build:
    name: JavaScript build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bindings/javascript/package-lock.json

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.58

      - name: Install JS dependencies
        working-directory: bindings/javascript
        run: npm ci

      - name: Build Node addon
        working-directory: bindings/javascript
        run: npm run build:node

      - name: Build WebAssembly package
        working-directory: bindings/javascript
        run: npm run build:web

      - name: Run JavaScript tests
        working-directory: bindings/javascript
        run: npm run test

      - name: Verify runtime compatibility
        working-directory: bindings/javascript
        run: npm run check:runtime-compatibility

      - name: Pack npm tarballs
        working-directory: bindings/javascript
        run: |
          mkdir -p ../../artifacts/npm
          npm --workspace @wkpjs/node pack --pack-destination ../../artifacts/npm
          npm --workspace @wkpjs/web pack --pack-destination ../../artifacts/npm

      - name: Upload JavaScript artifacts
        uses: actions/upload-artifact@v4
        with:
          name: js-artifacts-${{ matrix.os }}
          path: |
            bindings/javascript/packages/node/build/Release/*.node
            bindings/javascript/packages/web/dist/wkp_core.js
            bindings/javascript/packages/web/dist/wkp_core.wasm
            artifacts/npm/*.tgz
