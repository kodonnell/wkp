name: Build and upload to PyPI

on:
  workflow_dispatch:
    inputs:
      publish_to:
        description: "Publish target"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - testpypi
          - pypi
          - both
  push:
    branches: [main]
    tags:
      - "python-v*.*.*"
  pull_request:
    branches: [main]

jobs:
  validate-tag:
    name: Validate release tag format
    runs-on: ubuntu-latest
    steps:
      - name: Check tag format
        if: github.event_name == 'push'
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "Branch push detected; skipping tag format validation."
            exit 0
          fi
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^python-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid Python tag '$TAG'. Expected format: python-vX.Y.Z"
            exit 1
          fi

  build_sdist:
    needs: validate-tag
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true # Optional, use if you have submodules

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install pypa/build
        run: pip install build

      - name: Build source distribution
        run: python -m build --sdist bindings/python

      - uses: actions/upload-artifact@v4
        with:
          path: dist/*.tar.gz

  build_wheels:
    needs: build_sdist
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Docker images (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: docker-${{ runner.os }}-manylinux

      - name: Cache vcpkg installed packages (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/downloads
            C:/vcpkg/archives
          key: vcpkg-${{ runner.os }}-boost
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.3.1

      - name: Build wheels
        run: python -m cibuildwheel bindings/python --output-dir wheelhouse
        env:
          CIBW_BUILD_VERBOSITY: "1"
        # All cibuildwheel configuration is in bindings/python/pyproject.toml

      - name: Save vcpkg cache (Windows always)
        if: always() && matrix.os == 'windows-latest'
        uses: actions/cache/save@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/downloads
            C:/vcpkg/archives
          key: vcpkg-${{ runner.os }}-boost

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  release:
    name: Create GitHub release
    needs: [build_wheels]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/python-v')) || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.whl
          generate_release_notes: true


  publish-test:
    name: Publish to TestPyPI
    needs: [release] # ensure there's always a release for every publish
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/python-v')) || (github.event_name == 'workflow_dispatch' && (inputs.publish_to == 'testpypi' || inputs.publish_to == 'both'))
    environment:
      name: pypi
      url: https://test.pypi.org/p/wkp
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish:
    name: Publish to PyPI
    needs: [release]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/python-v')) || (github.event_name == 'workflow_dispatch' && (inputs.publish_to == 'pypi' || inputs.publish_to == 'both'))
    environment:
      name: pypi
      url: https://pypi.org/p/wkp
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1