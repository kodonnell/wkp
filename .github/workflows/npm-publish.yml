name: Publish JavaScript packages to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish in dry-run mode"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "npm-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.58

      - name: Install dependencies
        working-directory: bindings/javascript
        run: npm ci

      - name: Build packages
        working-directory: bindings/javascript
        run: |
          npm run build:node
          npm run build:web

      - name: Run JavaScript tests
        working-directory: bindings/javascript
        run: npm run test

      - name: Verify runtime compatibility
        working-directory: bindings/javascript
        run: npm run check:runtime-compatibility

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        working-directory: bindings/javascript
        run: |
          npm --workspace @wkpjs/node publish --access public --provenance --dry-run
          npm --workspace @wkpjs/web publish --access public --provenance --dry-run

      - name: Publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        working-directory: bindings/javascript
        run: |
          npm --workspace @wkpjs/node publish --access public --provenance
          npm --workspace @wkpjs/web publish --access public --provenance
